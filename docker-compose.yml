version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/credit_card_analyser
      - JWT_SECRET=cardvault_secret_change_in_prod
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
    # If the client needs to know the server URL at build time, it should be passed as an ARG in the Dockerfile
    # and mapped here in build.args

  mongo:
    image: mongo:6-jammy
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
